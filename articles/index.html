<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZuelGal - 档案解析终端</title>
    <style>
        :root { --bg-color: #0a0a0c; --primary: #e50914; }
        body { margin: 0; padding: 0; background-color: var(--bg-color); color: #eaeaea; display: flex; flex-direction: column; height: 100vh; overflow: hidden; font-family: sans-serif; }
        
        /* 顶部导航控制台 */
        .reader-header { height: 60px; background: rgba(20, 20, 25, 0.95); border-bottom: 1px solid #333; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; flex-shrink: 0; }
        .back-btn { color: #fff; text-decoration: none; font-size: 14px; display: flex; align-items: center; gap: 8px; }
        .back-btn:hover { color: var(--primary); }
        .article-title { font-size: 15px; font-weight: bold; color: #ccc; }

        /* PDF 画布容纳区（手机端可自由滑动） */
        .pdf-container { flex: 1; overflow-y: auto; text-align: center; padding: 20px 0; background: #111; }
        
        canvas { 
            max-width: 95%; /* 完美适配手机屏幕边缘 */
            margin-bottom: 15px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.6); 
            border-radius: 4px;
        }
        
        .loading-text { margin-top: 50px; color: #888; letter-spacing: 2px; }
    </style>
    
    <script src="/assets/js/pdf.min.js"></script>
</head>
<body>

    <div class="reader-header">
        <a href="/" class="back-btn">⬅ 退出查阅</a>
        <div class="article-title" id="display-title">正在解码机密档案...</div>
        <div style="width: 80px;"></div>
    </div>

    <div class="pdf-container" id="pdf-container">
        <div class="loading-text" id="loading-msg">SYSTEM LOADING...</div>
    </div>

    <script>
        // 1. 告诉引擎，它的苦力兄弟（worker）也在你的本地服务器上
        pdfjsLib.GlobalWorkerOptions.workerSrc = '/assets/js/pdf.worker.min.js';

        // 2. 你的档案数据库 (全本地化)
        const pdfDatabase = {
            "001": {
                title: "【企划】猪栏菜大同好会历史",
                url: "/assets/articles/ZUELGAl_history.pdf" 
            }
        };

        const urlParams = new URLSearchParams(window.location.search);
        const articleId = urlParams.get('id');
        const titleDisplay = document.getElementById('display-title');
        const container = document.getElementById('pdf-container');
        const loadingMsg = document.getElementById('loading-msg');

        if (articleId && pdfDatabase[articleId]) {
            const data = pdfDatabase[articleId];
            
            // 3. 强行抓取数据并逐页渲染（保留了防止 206 报错的参数）
            pdfjsLib.getDocument({
                url: data.url,
                disableRange: true,   // 必须保留：防止服务器底层协议切块报错
                disableStream: true
            }).promise.then(pdf => {
                loadingMsg.style.display = 'none'; 
                titleDisplay.innerText = `${data.title} (${pdf.numPages}页)`;
                
                for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
                    pdf.getPage(pageNum).then(page => {
                        // 手机端适当降低分辨率倍率以保证渲染流畅度，电脑端看着也足够清晰
                        const scale = window.innerWidth < 600 ? 1.2 : 1.5; 
                        const viewport = page.getViewport({ scale: scale });
                        
                        const canvas = document.createElement('canvas');
                        const context = canvas.getContext('2d');
                        canvas.height = viewport.height;
                        canvas.width = viewport.width;
                        
                        container.appendChild(canvas);
                        page.render({ canvasContext: context, viewport: viewport });
                    });
                }
            }).catch(err => {
                titleDisplay.innerText = "解码失败";
                loadingMsg.innerHTML = `⚠️ 文件读取错误: <br><br> ${err.message}`;
            });
        } else {
            titleDisplay.innerText = "档案丢失";
            loadingMsg.innerText = "ERROR 404";
        }
    </script>
</body>
</html>
